name: Deploy to DigitalOcean

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Bump version
        run: |
          python bump fix
          echo "VERSION=$(cat VERSION)" >> "$GITHUB_ENV"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "Bump version to ${{ env.VERSION }} [skip ci]"
          git push

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DROPLET_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DROPLET_IP }} >> ~/.ssh/known_hosts

      - name: Copy files to droplet
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            --include='*.py' \
            --include='Dockerfile' \
            --include='docker-compose.yml' \
            --include='pyproject.toml' \
            --include='uv.lock' \
            --include='VERSION' \
            --include='agent/' \
            --include='agent/CLAUDE.md' \
            --exclude='*' \
            ./ root@${{ secrets.DROPLET_IP }}:/opt/teleclaude/

      - name: Update droplet OS packages
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.DROPLET_IP }} bash -seuo pipefail <<'REMOTE'
          export DEBIAN_FRONTEND=noninteractive
          echo "=== OS packages: checking for updates ==="
          apt-get update
          # Upgrade non-interactively, keeping existing config files on conflict
          # so the deploy never blocks on a dpkg prompt.
          # Thorough upgrade: dist-upgrade handles dependency changes and kernel
          # transitions that plain upgrade holds back. Non-interactive, keeping
          # existing config files on conflict so the deploy never blocks.
          apt-get -y \
            -o Dpkg::Options::="--force-confdef" \
            -o Dpkg::Options::="--force-confold" \
            dist-upgrade
          # Reclaim space: drop obsolete packages and the apt cache. Also eases
          # disk pressure for the image build that follows.
          apt-get -y autoremove --purge
          apt-get clean
          REMOTE

      - name: Build and restart
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.DROPLET_IP }} bash -seuo pipefail <<'REMOTE'
          cd /opt/teleclaude

          echo "=== Disk before cleanup ==="
          df -h /
          docker system df || true

          # Stop the stack first so the running images become unused and can be
          # reclaimed BEFORE building new ones. Holding two copies of the large
          # image at once is what exhausted the droplet's disk ("no space left on
          # device" during layer export). Brief downtime is the cost of building
          # on a disk-constrained host. Volumes are preserved throughout (no
          # --volumes flag) so the SQLite DB and workspaces survive.
          docker compose down --remove-orphans || true

          # Reclaim all unused images, containers, networks, and build cache.
          docker system prune -af
          docker builder prune -af

          echo "=== Disk after cleanup ==="
          df -h /

          docker compose up -d --build

          # Drop the previous image layers, now dangling after the rebuild.
          docker image prune -af || true

          echo "=== Disk after build ==="
          df -h /
          docker compose ps
          REMOTE

      - name: Reboot droplet if required
        run: |
          KEY=~/.ssh/deploy_key
          HOST=root@${{ secrets.DROPLET_IP }}
          SSH="ssh -i $KEY -o ConnectTimeout=10 -o BatchMode=yes $HOST"

          if [ "$($SSH '[ -f /var/run/reboot-required ] && echo yes || echo no')" != "yes" ]; then
            echo "No reboot required — OS updates applied without one."
            exit 0
          fi

          echo "Reboot required to finish applying OS updates — rebooting droplet..."
          # Schedule the reboot via a transient systemd timer so this SSH command
          # returns cleanly BEFORE the box goes down (a direct 'reboot' would drop
          # the connection mid-command). Containers come back on boot via their
          # restart policy.
          $SSH 'systemd-run --on-active=5s --timer-property=AccuracySec=1s systemctl reboot'

          echo "Waiting for droplet to go down and come back..."
          sleep 30
          UP=0
          for i in $(seq 1 60); do
            if $SSH 'true' 2>/dev/null; then
              UP=1
              echo "Droplet reachable again after ~$((30 + i * 10))s."
              break
            fi
            sleep 10
          done
          if [ "$UP" != "1" ]; then
            echo "::error::Droplet did not come back within ~10 minutes after reboot."
            exit 1
          fi

          # Ensure the stack is up post-reboot (idempotent) and report.
          $SSH 'cd /opt/teleclaude && docker compose up -d && docker compose ps'

