services:
  teleclaude:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - teleclaude-data:/app/data

  teleclaude-agent:
    build: .
    restart: unless-stopped
    env_file: .env.agent
    ports:
      - "8081:8081"
    user: root
    command:
      - /bin/bash
      - -c
      - |
        # Auto-detect Docker socket GID and add teleclaude user to it
        if [ -S /var/run/docker.sock ]; then
          SOCK_GID=$$(stat -c '%g' /var/run/docker.sock)
          if ! getent group "$$SOCK_GID" > /dev/null 2>&1; then
            groupadd -g "$$SOCK_GID" dockersock
          fi
          usermod -aG "$$SOCK_GID" teleclaude
        fi
        # Install personal CLAUDE.md into the volume-mounted ~/.claude dir.
        # Copied unconditionally so the repo is the source of truth.
        if [ -f /opt/teleclaude-agent/CLAUDE.md ]; then
          install -o teleclaude -g teleclaude -m 0644 \
            /opt/teleclaude-agent/CLAUDE.md \
            /home/teleclaude/.claude/CLAUDE.md
        fi
        # Write boo-cloud credentials from env to the default config path so
        # boocloud-mcp finds them without needing any env var at runtime.
        if [ -n "$BOO_CLOUD_CREDENTIALS_TOML" ]; then
          mkdir -p /home/teleclaude/.config/boo-cloud
          printf '%s' "$BOO_CLOUD_CREDENTIALS_TOML" > /home/teleclaude/.config/boo-cloud/credentials.toml
          chmod 600 /home/teleclaude/.config/boo-cloud/credentials.toml
          chown -R teleclaude:teleclaude /home/teleclaude/.config/boo-cloud
        fi
        # Register build123d-mcp globally (user scope). Remove first so this is
        # idempotent across restarts. uvx --refresh fetches the latest PyPI
        # release on each session start, providing automatic updates.
        runuser -u teleclaude -- sh -c '
          claude mcp remove build123d-mcp 2>/dev/null
          claude mcp add -s user build123d-mcp -- uvx --refresh build123d-mcp
          claude mcp remove boo-cloud 2>/dev/null
          claude mcp add -s user boo-cloud -- boocloud-mcp
        '
        # Headroom context compression ("headroom wrap claude", full parity):
        #  1. Register rtk's PreToolUse hook in ~/.claude (compresses Bash output).
        #     Runs after the CLAUDE.md install above so its @RTK.md reference sticks.
        #  2. Start the Headroom proxy and route the Claude CLI through it via
        #     ANTHROPIC_BASE_URL (inherited by every claude subprocess bot_agent
        #     spawns). One shared, entrypoint-owned proxy — never recycled with a
        #     per-chat claude process. Both steps are best-effort: a failure must
        #     not stop the bot from starting.
        runuser -u teleclaude -- rtk init --global --auto-patch || true
        runuser -u teleclaude -- sh -c '
          mkdir -p /home/teleclaude/.headroom/logs
          nohup headroom proxy --host 127.0.0.1 --port 8787 \
            > /home/teleclaude/.headroom/logs/proxy.boot.log 2>&1 &
        ' || true
        export ANTHROPIC_BASE_URL=http://127.0.0.1:8787
        exec runuser -u teleclaude -- python bot_agent.py
    volumes:
      - teleclaude-agent-data:/app/data
      - teleclaude-workspaces:/app/workspaces
      - teleclaude-claude-config:/home/teleclaude/.claude
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  teleclaude-data:
  teleclaude-agent-data:
  teleclaude-workspaces:
  teleclaude-claude-config:
