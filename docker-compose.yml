services:
  teleclaude:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - teleclaude-data:/app/data

  teleclaude-agent:
    build: .
    restart: unless-stopped
    env_file: .env.agent
    ports:
      - "8081:8081"
    user: root
    command:
      - /bin/bash
      - -c
      - |
        # Auto-detect Docker socket GID and add teleclaude user to it
        if [ -S /var/run/docker.sock ]; then
          SOCK_GID=$$(stat -c '%g' /var/run/docker.sock)
          if ! getent group "$$SOCK_GID" > /dev/null 2>&1; then
            groupadd -g "$$SOCK_GID" dockersock
          fi
          usermod -aG "$$SOCK_GID" teleclaude
        fi
        # Install personal CLAUDE.md into the volume-mounted ~/.claude dir.
        # Copied unconditionally so the repo is the source of truth.
        if [ -f /opt/teleclaude-agent/CLAUDE.md ]; then
          install -o teleclaude -g teleclaude -m 0644 \
            /opt/teleclaude-agent/CLAUDE.md \
            /home/teleclaude/.claude/CLAUDE.md
        fi
        # Write boo-cloud credentials from env to the default config path so
        # boocloud-mcp finds them without needing any env var at runtime.
        if [ -n "$BOO_CLOUD_CREDENTIALS_TOML" ]; then
          mkdir -p /home/teleclaude/.config/boo-cloud
          printf '%s' "$BOO_CLOUD_CREDENTIALS_TOML" > /home/teleclaude/.config/boo-cloud/credentials.toml
          chmod 600 /home/teleclaude/.config/boo-cloud/credentials.toml
          chown -R teleclaude:teleclaude /home/teleclaude/.config/boo-cloud
        fi
        # Register build123d-mcp globally (user scope). Remove first so this is
        # idempotent across restarts. uvx --refresh fetches the latest PyPI
        # release on each session start, providing automatic updates.
        runuser -u teleclaude -- sh -c '
          claude mcp remove build123d-mcp 2>/dev/null
          claude mcp add -s user build123d-mcp -- uvx --refresh build123d-mcp
          claude mcp remove boo-cloud 2>/dev/null
          claude mcp add -s user boo-cloud -- boocloud-mcp
        '
        # ── Headroom context compression (fail-safe) ─────────────────────
        # Start the Headroom proxy and route the Claude CLI through it via
        # ANTHROPIC_BASE_URL, but ONLY after confirming the proxy actually
        # accepts connections. If it never comes up, fall back to the Anthropic
        # API directly so the bot still works — exporting ANTHROPIC_BASE_URL to
        # a dead port is what previously broke the agent ("ConnectionRefused"
        # on the first message). Every branch logs which path it took, visible
        # via `docker compose logs teleclaude-agent`. Set HEADROOM_ENABLED=0 in
        # .env.agent to skip Headroom entirely without a rebuild.
        HEADROOM_PORT=8787
        # RTK output filtering is independent of Headroom — always install it.
        timeout 20 runuser -u teleclaude -- rtk init --global --auto-patch < /dev/null || true
        if [ "$${HEADROOM_ENABLED:-0}" = "0" ] || [ "$${HEADROOM_ENABLED:-0}" = "false" ]; then
          echo "[headroom] disabled by HEADROOM_ENABLED — Claude uses the Anthropic API directly."
        else
          # Never compress MCP tool results: the agent needs exact output
          # (measurements, error messages, debug prints) for iterative MCP
          # workflows — Headroom's CCR compression was replacing them with
          # <<ccr:hash>> markers (issue #69). Headroom matches tool names
          # exactly (no wildcards), so each tool is listed; update these lists
          # when the MCP servers add tools. Extra names can be added via
          # HEADROOM_EXCLUDE_TOOLS in .env.agent — Headroom merges both.
          MCP_EXCLUDE=""
          for t in align_check analyze_printability clearance cross_sections \
                   diff_snapshot execute export health_check import_cad_file \
                   inspect_drawing install_skill last_error lint_drawing \
                   load_part measure render_drawing render_view repair_hints \
                   reset resolve restore_snapshot save_drawing_annotations \
                   save_snapshot script search_library session_state \
                   shape_compare suggest_view_layout version view_axes \
                   workflow_hints; do
            MCP_EXCLUDE="$${MCP_EXCLUDE},mcp__build123d-mcp__$${t}"
          done
          for t in get_print_info get_status list_printers start_print \
                   validate_3mf; do
            MCP_EXCLUDE="$${MCP_EXCLUDE},mcp__boo-cloud__$${t}"
          done
          MCP_EXCLUDE="$${MCP_EXCLUDE#,}"
          # The `headroom proxy` click CLI in 0.24.0 does not expose
          # --exclude-tools (and ignores HEADROOM_EXCLUDE_TOOLS); only the
          # module entry point wires it, so launch the proxy through that.
          runuser -u teleclaude -- sh -c "
            mkdir -p /home/teleclaude/.headroom/logs
            while true; do
              /opt/uv-tools/headroom-ai/bin/python -m headroom.proxy.server \
                --host 127.0.0.1 --port $${HEADROOM_PORT} \
                --exclude-tools \"$${MCP_EXCLUDE}\" \
                >> /home/teleclaude/.headroom/logs/proxy.boot.log 2>&1
              echo \"[headroom] proxy exited at \$$(date -Iseconds), restarting in 5s...\" \
                >> /home/teleclaude/.headroom/logs/proxy.boot.log
              sleep 5
            done &
          " || true
          # Cold start is slow: ~7s for imports plus a one-time HuggingFace
          # model download (kompress + ModernBERT) on a fresh container, so we
          # wait up to ~60s for the port to accept connections.
          HEADROOM_UP=0
          for i in $$(seq 1 120); do
            if (exec 3<>/dev/tcp/127.0.0.1/$${HEADROOM_PORT}) 2>/dev/null; then
              HEADROOM_UP=1
              break
            fi
            sleep 0.5
          done
          if [ "$$HEADROOM_UP" = "1" ]; then
            export ANTHROPIC_BASE_URL=http://127.0.0.1:$${HEADROOM_PORT}
            echo "[headroom] proxy UP on 127.0.0.1:$${HEADROOM_PORT} after ~$$((i / 2))s — routing Claude through it (ANTHROPIC_BASE_URL set)."
          else
            unset ANTHROPIC_BASE_URL
            echo "[headroom] WARNING: proxy did NOT come up on 127.0.0.1:$${HEADROOM_PORT} within ~60s — DISABLING Headroom; Claude will use the Anthropic API directly. Proxy boot log follows:" >&2
            tail -n 30 /home/teleclaude/.headroom/logs/proxy.boot.log 2>/dev/null >&2 || true
          fi
        fi
        exec runuser -u teleclaude -- python bot_agent.py
    volumes:
      - teleclaude-agent-data:/app/data
      - teleclaude-workspaces:/app/workspaces
      - teleclaude-claude-config:/home/teleclaude/.claude
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  teleclaude-data:
  teleclaude-agent-data:
  teleclaude-workspaces:
  teleclaude-claude-config:
